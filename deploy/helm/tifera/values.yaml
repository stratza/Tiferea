# TifEra Helm chart values.
#
# Auth: TifEra requires login (first-run admin -> stored in the tifera-auth
# Secret; Admin/Operator/Viewer roles enforced server-side). It terminates no
# TLS, so keep the Service ClusterIP + `kubectl port-forward` or front it with
# a TLS proxy, and consider enabling the NetworkPolicy below.

image:
  repository: tifera
  tag: ""            # defaults to the chart appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP    # NodePort/LoadBalancer widens who holds full operator power
  port: 80

replicaCount: 1      # keep 1: single ReadWriteOnce PVC

# TifEra keeps an in-memory snapshot of the whole cluster (pod inventory, the
# palette's resource index - which briefly holds full Secret/ConfigMap bodies
# while extracting names - and per-container metrics history), so memory
# scales with cluster size, not with TifEra's own workload. Raise this for
# large clusters (many namespaces/pods, or many/large Secrets); the pod logs
# how big each snapshot was on every rebuild, so check those against actual
# usage before raising blindly.
resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: "1"
    memory: 512Mi

persistence:
  enabled: true      # snippets + action log survive pod rescheduling
  size: 1Gi
  storageClass: ""   # "" = cluster default
  existingClaim: ""  # use a pre-created PVC instead

rbac:
  # The pod-restart quick action needs `delete pods`; disable to drop it.
  allowPodDelete: true
  # YAML apply/edit from the console needs `update` on workloads/configmaps/
  # services. Disable to keep the describe view read-only.
  allowApply: true

networkPolicy:
  # Restrict who can reach the console. When enabled with an empty `ingress`
  # list, ALL ingress to TifEra is denied - add rules for your operators.
  enabled: false
  ingress: []
  # Example - allow only pods labeled for console access, in any namespace:
  #   - from:
  #       - namespaceSelector: {}
  #         podSelector:
  #           matchLabels:
  #             tifera.stratza.dev/console-access: "allowed"

config:
  idleTimeoutSeconds: 1800
  reconnectGraceSeconds: 10
  maxUploadBytes: 2147483648
  debugImage: busybox:1.36
  recordSessions: false
  castRetentionDays: 14
  metricsIntervalSeconds: 15

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
