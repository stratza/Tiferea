apiVersion: v2
name: tifera
description: >-
  TifEra - in-cluster-only Kubernetes operations console. One-click container
  shells, file transfer, logs, metrics and topology through the Kubernetes
  API, with no agents and no kubeconfig. Login with Admin/Operator/Viewer roles.
type: application
version: 0.3.4
appVersion: "0.3.4"
kubeVersion: ">=1.27.0-0"
home: https://github.com/stratza/tiferea
sources:
  - https://github.com/stratza/tiferea
keywords:
  - kubernetes
  - console
  - terminal
  - operations
maintainers:
  - name: Stratza Labs
