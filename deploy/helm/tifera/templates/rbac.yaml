apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tifera.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tifera.labels" . | nindent 4 }}
---
# Least-privilege ClusterRole. If you trim it, TifEra surfaces the missing
# permissions as a UI banner instead of failing silently.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tifera.fullname" . }}
  labels:
    {{- include "tifera.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  # Command-palette search & describe (names only; Secret values are masked).
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list"]
  {{- if .Values.rbac.allowApply }}
  # YAML apply / edit from the console (update verb).
  - apiGroups: [""]
    resources: ["configmaps", "services"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["update"]
  {{- end }}
  # WebSocket clients open exec/portforward with GET (verb "get");
  # SPDY clients like kubectl use POST (verb "create"). Both are needed.
  - apiGroups: [""]
    resources: ["pods/exec", "pods/attach", "pods/portforward"]
    verbs: ["get", "create"]
  # Ephemeral debug containers are added with PATCH.
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  {{- if .Values.rbac.allowPodDelete }}
  # Pod restart quick action (rbac.allowPodDelete).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  {{- end }}
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Startup self-checks.
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["selfsubjectreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tifera.fullname" . }}
  labels:
    {{- include "tifera.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tifera.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tifera.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespaced Role for TifEra's own auth Secret (users + session signing key).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tifera.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tifera.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tifera-auth"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tifera.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tifera.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tifera.fullname" . }}-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "tifera.fullname" . }}
    namespace: {{ .Release.Namespace }}
